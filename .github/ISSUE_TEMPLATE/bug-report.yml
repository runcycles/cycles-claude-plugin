name: Bug report
description: Report incorrect enforcement, settlement, installation, or command behavior
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Never paste `CYCLES_API_KEY` or other credentials. Redact tenant and application identifiers when necessary.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the observed behavior and its enforcement impact.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Include the tool type and budget state, but redact arguments or identifiers that contain sensitive data.
    validations:
      required: true
  - type: input
    id: plugin-version
    attributes:
      label: Plugin version
      placeholder: 0.2.0
    validations:
      required: true
  - type: input
    id: claude-version
    attributes:
      label: Claude Code version
      description: Output of `claude --version`.
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node.js version
      description: Output of `node --version`.
    validations:
      required: true
  - type: dropdown
    id: operating-system
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
        - WSL
        - Other
    validations:
      required: true
  - type: textarea
    id: doctor
    attributes:
      label: Redacted doctor output
      description: Paste `/cycles-budget-guard:doctor` output after confirming that it contains no sensitive identifiers.
      render: text
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Remove credentials, subject identifiers, prompts, file contents, and tool arguments.
      render: text
